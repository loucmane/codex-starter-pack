[mcp_servers.taskmaster-ai]
type = "stdio"
command = "npx"
args = ["-y", "--package=task-master-ai", "task-master-ai"]

[mcp_servers.taskmaster-ai.env]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"
PERPLEXITY_API_KEY = "${PERPLEXITY_API_KEY}"
OPENAI_API_KEY = "${OPENAI_API_KEY}"
GOOGLE_API_KEY = "${GOOGLE_API_KEY}"
MISTRAL_API_KEY = "${MISTRAL_API_KEY}"
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
XAI_API_KEY = "${XAI_API_KEY}"
AZURE_OPENAI_API_KEY = "${AZURE_OPENAI_API_KEY}"
OLLAMA_API_KEY = "${OLLAMA_API_KEY}"

[mcp_servers.serena]
type = "stdio"
command = "uvx"
args = ["--from", "git+https://github.com/oraios/serena@229fac066237f7156c8fe2a9fa7166f95715e0b3", "serena", "start-mcp-server", "--project-from-cwd"]

[mcp_servers.serena.tools.write_memory]
approval_mode = "approve"

[projects."/home/loucmane/codex"]
trust_level = "trusted"

[projects."/tmp/aegis-task133-codex-live-1780220128/shop-webapp"]
trust_level = "trusted"

[projects."/tmp/aegis-task133-codex-live-full-1780221000/shop-webapp"]
trust_level = "trusted"

[projects."/tmp/aegis-task133-codex-live-full2-1780222000/shop-webapp"]
trust_level = "trusted"

[projects."/tmp/aegis-task133-codex-live-full3-1780222312/shop-webapp"]
trust_level = "trusted"

[projects."/tmp/aegis-task133-codex-live-full4-R8DoDU/shop-webapp"]
trust_level = "trusted"

[plugins."github@openai-curated"]
enabled = true

[repo_structure]
templates_root = "templates"
sessions_root = "sessions"
plans_root = "plans"
plan_state_dir = ".plan_state"
taskmaster_root = ".taskmaster"
work_tracking_root = "docs/ai/work-tracking"
reports_root = "reports"

[tui]
pet = "disabled"
