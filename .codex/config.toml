model = "gpt-5.4"
model_provider = "openai"
approval_policy = "on-request"
profile = "deep-work"
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"
model_verbosity = "high"
personality = "pragmatic"

[sandbox_workspace_write]
network_access = true
writable_roots = ["/home/loucmane/codex", "/tmp"]
exclude_tmpdir_env_var = false
exclude_slash_tmp = false

[shell_environment_policy]
inherit = "core"
include_only = ["PATH", "HOME", "USER", "SHELL", "CODEX_HOME", "OPENAI_API_KEY"]

[profiles.deep-work]
model = "gpt-5.4"
approval_policy = "on-request"
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"
model_verbosity = "high"

[profiles.fast-iterate]
model = "gpt-5.4"
approval_policy = "on-request"
model_reasoning_effort = "medium"
model_reasoning_summary = "concise"
model_verbosity = "medium"

[mcp_servers.taskmaster-ai]
type = "stdio"
command = "npx"
args = ["-y", "--package=task-master-ai", "task-master-ai"]

[mcp_servers.taskmaster-ai.env]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"
PERPLEXITY_API_KEY = "${PERPLEXITY_API_KEY}"
OPENAI_API_KEY = "${OPENAI_API_KEY}"
GOOGLE_API_KEY = "${GOOGLE_API_KEY}"
MISTRAL_API_KEY = "${MISTRAL_API_KEY}"
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
XAI_API_KEY = "${XAI_API_KEY}"
AZURE_OPENAI_API_KEY = "${AZURE_OPENAI_API_KEY}"
OLLAMA_API_KEY = "${OLLAMA_API_KEY}"

[mcp_servers.serena]
type = "stdio"
command = "uvx"
args = ["--from", "git+https://github.com/oraios/serena@229fac066237f7156c8fe2a9fa7166f95715e0b3", "serena", "start-mcp-server", "--project-from-cwd"]

[projects."/home/loucmane/codex"]
trust_level = "trusted"

[plugins."github@openai-curated"]
enabled = true
