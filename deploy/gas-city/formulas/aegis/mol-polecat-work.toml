description = """
Polecat work lifecycle — feature-branch variant.

Extends mol-polecat-base with feature-branch workspace setup and
refinery-based submission. The polecat creates a feature branch,
implements the work, then pushes and reassigns to the refinery for
merge review.

## Polecat Contract (Self-Cleaning Model)

1. Receive work (molecule poured with this formula, assigned to you)
2. Follow steps in order (read descriptions, execute, move to next)
3. Submit: push branch, set metadata on work bead, assign to refinery, exit
4. You are GONE — Refinery merges, closes the bead

**No MR beads.** Work beads flow directly: pool → polecat → refinery → closed.
The polecat sets `metadata.branch` and `metadata.target` on the work bead
and reassigns it to the refinery. The refinery merges and closes.

**NEVER CLOSE BEADS.** You must not run `bd close` or set status=closed.
Even if you believe the code is already merged, reassign to refinery —
only the refinery verifies merges and closes beads.
`{{base_branch}}` may come from the work bead's own `metadata.target` or
be inherited from a parent convoy with `metadata.target` set.

## Variables

| Variable | Source | Description |
|----------|--------|-------------|
| binding_prefix | import binding | Agent identity prefix for bound Gas Town imports. |
| affected_tests_command | rig `formula_vars` | Shell-safe command that reads `git diff --name-only origin/{{base_branch}}...HEAD` and runs the matching test subset. Empty = run full `test_command`. |

**Rejection-aware.** If the work bead has `metadata.branch` and
`metadata.rejection_reason`, a previous attempt was rejected by the
refinery. Resume the existing branch — don't redo all the work.

## Failure Modes

| Situation | Action |
|-----------|--------|
| Tests fail | Fix them. Do not proceed with failures. |
| Blocked on external | Mail Witness, mark yourself stuck |
| Context filling | `gc runtime request-restart` (blocks until controller kills you) |
| Unsure what to do | Mail Witness, don't guess |"""
formula = "mol-polecat-work"
extends = ["mol-polecat-base"]

[requires]
formula_compiler = ">=2.0.0"

[vars]
[vars.binding_prefix]
description = "Import binding prefix for gastown agent identities, including trailing dot when bound."
default = ""

[vars.affected_tests_command]
description = "Shell-safe affected-tests command. Must read `git diff --name-only origin/{{base_branch}}...HEAD` and run the matching test subset. From rig `formula_vars` or empty to run full test_command."
default = ""

[[steps]]
id = "workspace-setup"
title = "Set up worktree and feature branch"
needs = ["load-context"]
description = """
Trusted pre-provider startup has already claimed and proved this exact
mol-polecat-work graph, derived its one durable source task from the input
convoy, prepared the existing outer Gas City polecat worktree, recorded the
source task's branch/work_dir metadata, and completed Aegis kickoff.

Do not create another worktree, switch to another branch, infer work from
GC_BEAD_ID, or rewrite branch metadata. Validate the immutable startup result:

```bash
set -eu
CONVOY_STATUS=$(gc convoy status {{convoy_id}} --json)
WORK_BEAD_ID=$(printf '%s' "$CONVOY_STATUS" | jq -r 'if (.schema_version == "1" and (.children | length) == 1) then .children[0].id else empty end')
if [ -z "$WORK_BEAD_ID" ]; then
  echo "mol-polecat-work requires an input convoy with exactly one tracked member" >&2
  exit 1
fi
EXPECTED_BRANCH="polecat/$WORK_BEAD_ID"
WORK_JSON=$(bd --json --readonly -C "$PWD" show --id "$WORK_BEAD_ID")
METADATA_BRANCH=$(printf '%s' "$WORK_JSON" | jq -r 'if length == 1 then .[0].metadata.branch // empty else empty end')
METADATA_WORK_DIR=$(printf '%s' "$WORK_JSON" | jq -r 'if length == 1 then .[0].metadata.work_dir // empty else empty end')
CURRENT_BRANCH=$(git branch --show-current)
COMMON_DIR=$(realpath "$(git rev-parse --path-format=absolute --git-common-dir)")
CURRENT_WORK=$(jq -r '.task.id + ":" + .task.source + ":" + .branch.current' .aegis/state/current-work.json)
STARTUP_WORK=$(jq -r '.source_work_id + ":" + .branch + ":" + .work_dir + ":" + .status' /run/gas-city/aegis-startup-receipt.json)

test "$CURRENT_BRANCH" = "$EXPECTED_BRANCH"
test "$METADATA_BRANCH" = "$EXPECTED_BRANCH"
test "$(realpath "$METADATA_WORK_DIR")" = "$(realpath "$PWD")"
test "${GIT_DIR:-}" = "/run/gas-city-git/private.git"
test "${GIT_WORK_TREE:-}" = "$(realpath "$PWD")"
test "$COMMON_DIR" = "/run/gas-city-git/private.git"
test "$(jq -r '.git_private_common_dir' /run/gas-city/aegis-startup-receipt.json)" = "$COMMON_DIR"
test "$CURRENT_WORK" = "$WORK_BEAD_ID:beads:$EXPECTED_BRANCH"
case "$STARTUP_WORK" in
  "$WORK_BEAD_ID:$EXPECTED_BRANCH:$(realpath "$PWD"):prepared"|
  "$WORK_BEAD_ID:$EXPECTED_BRANCH:$(realpath "$PWD"):resumed") ;;
  *) echo "trusted pre-provider startup receipt does not match this worktree" >&2; exit 1 ;;
esac
```

Run project setup only after every validation succeeds:

```bash
{{setup_command}}
```

Empty setup_command -> skip.

**Exit criteria:** The current directory is the exact Aegis outer polecat
worktree on polecat/<source-work-bead-id>, Beads metadata and current-work agree,
the trusted startup receipt agrees, and project setup (if configured) passed."""

[[steps]]
id = "self-review"
title = "Self-review and run tests (affected-aware)"
needs = ["implement"]
description = """
Review your changes and verify they work. Override of mol-polecat-base
`self-review` to support affected-test detection — when the rig configures
`affected_tests_command`, only the tests touched by your diff run, instead
of the full suite. Saves polecat time and reduces CI clog from PRs whose
locally-runnable failures should have been caught before push.

**Config: setup_command = {{setup_command}}**
**Config: typecheck_command = {{typecheck_command}}**
**Config: lint_command = {{lint_command}}**
**Config: build_command = {{build_command}}**
**Config: test_command = {{test_command}}**
**Config: affected_tests_command = {{affected_tests_command}}**

**1. Review the diff:**
```bash
git diff origin/{{base_branch}}...HEAD
git log --oneline origin/{{base_branch}}..HEAD
git diff --stat origin/{{base_branch}}...HEAD
```

Check for: bugs, security issues, style violations, missing error handling,
debug cruft, unintended file changes. Fix anything you find.

**2. Run quality checks (skip empty commands):**
```bash
{{setup_command}}
{{typecheck_command}}
{{lint_command}}
{{build_command}}
```

**3. Run tests — affected subset if rig provides one, full suite otherwise:**
```bash
if [ -n "{{affected_tests_command}}" ]; then
    # Rig has an affected-tests detector. Run only the tests our diff
    # touches — same logic the rig's CI uses to dispatch test workflows.
    # The command must read `git diff --name-only origin/{{base_branch}}...HEAD`
    # internally and execute the relevant test subset.
    {{affected_tests_command}}
else
    # No affected detector — run the full suite (legacy behavior).
    {{test_command}}
fi
```

**ALL CHECKS MUST PASS.** If your change caused the failure, fix it.
If pre-existing, file a bead.

Refusing to push on local failure is a feature: the rig's CI will run the
same affected subset (and more), and a PR that already fails locally will
fail in CI too — wasting reviewer attention and CI minutes. Fix before
submitting.

**4. Ensure everything is committed:**
```bash
git status                  # Must be clean
git log origin/{{base_branch}}..HEAD --oneline  # Must show your commits
```

If uncommitted changes exist, commit them with a body explaining what
slipped through the `implement` step (typically a self-review touch-up,
test addition, or formatter run):
```bash
CONVOY_STATUS=$(gc convoy status {{convoy_id}} --json)
WORK_BEAD_ID=$(printf '%s' "$CONVOY_STATUS" | jq -r 'if (.children | length) == 1 then .children[0].id else empty end')
git add -A
git commit -m "<type>: <imperative subject> ($WORK_BEAD_ID)" -m "$(cat <<'BODY'
<Explain what these residual changes are: a self-review fix,
test-only addition, formatter run, etc. Be specific.>
BODY
)"
```

NEVER discard implementation changes with `git checkout -- .`

**Exit criteria:** All checks pass (affected subset OR full suite), all
changes committed, working tree clean."""

[[steps]]
id = "submit-and-exit"
title = "Submit work to refinery and exit"
needs = ["self-review"]
description = """
Hand off your work and self-clean. You cease to exist after this step.

**1. Branch-shape gate (fails closed — non-negotiable).**

Before anything else, verify you are on a per-bead branch. The refinery
merges the branch recorded in your bead's `metadata.branch`, which must
follow the `polecat/<bead-id>` convention; if you push from a different
branch (your agent home branch, a stray local checkout, etc.), the
handoff contract is broken and the bead is permanently stranded as
"assigned to refinery, no merge target". See gastownhall/gascity#2082.

```bash
CONVOY_STATUS=$(gc convoy status {{convoy_id}} --json)
WORK_BEAD_ID=$(printf '%s' "$CONVOY_STATUS" | jq -r 'if (.children | length) == 1 then .children[0].id else empty end')
CURRENT_BRANCH=$(git branch --show-current)
EXPECTED_BRANCH="polecat/$WORK_BEAD_ID"
if [ "$CURRENT_BRANCH" != "$EXPECTED_BRANCH" ]; then
    echo "BRANCH SHAPE GATE FAILED"
    echo "  current branch:  $CURRENT_BRANCH"
    echo "  expected branch: $EXPECTED_BRANCH"
    echo ""
    echo "Refinery handoff merges metadata.branch, which must be 'polecat/<bead-id>'."
    echo "Pushing this commit and reassigning to refinery would strand the work."
    echo ""
    echo "Recover by re-running the workspace-setup step:"
    echo "  - Create the per-bead worktree at \\$(pwd)/worktrees/$WORK_BEAD_ID"
    echo "  - Create branch '$EXPECTED_BRANCH' from origin/{{base_branch}}"
    echo "  - Cherry-pick your commits from $CURRENT_BRANCH onto the new branch"
    echo "  - Re-run submit-and-exit"
    echo ""
    echo "Do NOT proceed past this gate."
    gc runtime drain-ack
    exit 1
fi
```

Also confirm `metadata.branch` reflects this branch (workspace-setup
recorded it, but a divergent local state would be invisible to the
refinery without this re-check):
```bash
METADATA_BRANCH=$(gc bd show "$WORK_BEAD_ID" --json | jq -r '.[0].metadata.branch // empty')
if [ "$METADATA_BRANCH" != "$EXPECTED_BRANCH" ]; then
    gc bd update "$WORK_BEAD_ID" --set-metadata branch="$EXPECTED_BRANCH"
fi
```

**2. Final clean-state verification (safeguard):**
```bash
git status --porcelain
```
If ANY output (untracked files, uncommitted changes):
```bash
git add -A
git commit -m "chore: capture remaining work ($WORK_BEAD_ID)" -m "$(cat <<'BODY'
<Explain the remaining changes discovered by final clean-state
verification and why they are safe to hand off.>
BODY
)"
```
This is a belt-and-suspenders check — self-review should have caught this,
but we never push with untracked work left behind.

**3. Push your branch:**
```bash
AUTO_PUSH=$(gc bd show "$WORK_BEAD_ID" --json | jq -r '.[0].metadata | if has("auto_push") then (.auto_push | tostring) else "" end')
if [ "$AUTO_PUSH" = "false" ]; then
  echo "auto_push=false: halting at branch-ready (no push, no refinery handoff)"
  BRANCH=$(git branch --show-current)
  gc bd update "$WORK_BEAD_ID" \
    --status=open --assignee="" \
    --set-metadata branch="$BRANCH" \
    --set-metadata target={{base_branch}} \
    --set-metadata branch_ready=true \
    --set-metadata halt_reason=auto_push_false \
    --set-metadata gc.routed_to="" \
    --notes "Branch ready: auto_push=false (no push, no refinery handoff)"
  gc runtime drain-ack
  exit 0
fi
git push origin HEAD
PUSH_EXIT=$?
if [ $PUSH_EXIT -ne 0 ]; then
    echo "PUSH FAILED (exit $PUSH_EXIT)"
    echo "Branch '$CURRENT_BRANCH' was NOT pushed to origin."
    echo "Aborting handoff — bead stays with polecat."
    echo ""
    echo "Diagnose the push failure (network, auth, force-needed?) and re-run submit-and-exit."
    gc runtime drain-ack
    exit 1
fi
# Verify the ref is reachable on origin before trusting the push succeeded.
REMOTE_REF=$(git ls-remote origin "refs/heads/$CURRENT_BRANCH" 2>/dev/null | awk '{print $1}')
LOCAL_HEAD=$(git rev-parse HEAD)
if [ -z "$REMOTE_REF" ]; then
    echo "PUSH VERIFICATION FAILED"
    echo "  git push exited 0 but 'git ls-remote' returned no ref for '$CURRENT_BRANCH' on origin."
    echo "  Branch is local-only. Aborting handoff."
    gc runtime drain-ack
    exit 1
fi
if [ "$REMOTE_REF" != "$LOCAL_HEAD" ]; then
    echo "PUSH VERIFICATION FAILED"
    echo "  origin/$CURRENT_BRANCH = $REMOTE_REF"
    echo "  local HEAD             = $LOCAL_HEAD"
    echo "  Branch tip on origin does not match local HEAD. Aborting handoff."
    gc runtime drain-ack
    exit 1
fi
```

**4. Clean up local branch (prevent stale branch accumulation):**
```bash
BRANCH=$(git branch --show-current)
git checkout --detach                 # Detach so we can delete the branch
git branch -D "$BRANCH"              # Branch is pushed; refinery owns it now
```

**5. Update metadata on the work bead:**
```bash
gc bd update "$WORK_BEAD_ID" \
  --set-metadata target={{base_branch}} \
  --notes "Implemented: <brief summary>"
```
Branch was recorded in workspace-setup and is already in metadata.
This adds the target for the refinery. If an existing pull request was
provided by the caller, `metadata.existing_pr` is preserved for refinery
validation. The refinery records canonical `pr_url` only after verifying
the PR is open and matches the branch, base, and origin repository.

**6. Reassign to refinery:**
```bash
REFINERY_TARGET="${GC_RIG:+$GC_RIG/}{{binding_prefix}}refinery"
gc bd update "$WORK_BEAD_ID" --status=open --assignee="$REFINERY_TARGET" --set-metadata gc.routed_to=""
```

`${GC_RIG:+$GC_RIG/}{{binding_prefix}}refinery` resolves to
`$GC_RIG/{{binding_prefix}}refinery` when running inside a rig session,
or `{{binding_prefix}}refinery` when running in an HQ-only city where
the workspace is the rig. Writing a rendered empty rig prefix produces
`/{{binding_prefix}}refinery` and strands beads outside the refinery pool.

Set `assignee` to the configured refinery named-session identity and clear
`gc.routed_to` because the direct assignment is the handoff. Generic pool
demand is represented by unassigned work with `gc.routed_to=<target>`, so
named-session work should not retain pool-demand metadata.

The refinery will pick this up, rebase onto {{base_branch}}, run tests,
merge, and close the bead. If there's a conflict, the refinery puts the
bead back in the pool with `rejection_reason` metadata — a new polecat
picks it up and resumes from the existing branch.

**7. Signal refinery to check for work immediately (belt-and-suspenders):**
```bash
REFINERY_TARGET="${GC_RIG:+$GC_RIG/}{{binding_prefix}}refinery"
gc session wake "$REFINERY_TARGET" || true
gc session nudge "$REFINERY_TARGET" "Run 'gc prime' to check merge queue and begin processing." || true
```

The `gc bd update` in step 6 generates a `bead.updated` event the refinery's
event-watch will see, but that can take up to `event_timeout` seconds. Wake
starts a stopped on_demand session; nudge leaves a visible prompt for a running
one as soon as it is ready for input. Failure is non-fatal: the refinery finds
the work on its next poll.

**8. Signal reconciler and exit.**
```bash
gc runtime drain-ack
exit
```

`gc runtime drain-ack` tells the reconciler to kill this session. The
reconciler only restarts you if the pool check command finds more work.
You are GONE. Done means gone. There is no idle state.

**Exit criteria:** Branch pushed, metadata set, bead reassigned, refinery signaled, drain acknowledged, session exited."""
