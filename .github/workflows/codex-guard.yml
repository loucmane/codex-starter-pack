name: Codex Guard

on:
  pull_request:
  push:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Sync active plan
        run: python3 scripts/codex-task plan sync
      - name: Run codex guard
        run: python3 scripts/codex-guard validate --include-untracked
      - name: Run template drift check
        run: python3 scripts/codex-guard drift-check --strict
      - name: Generate template metrics dashboard
        run: python3 scripts/template-metrics-dashboard
      - name: Upload drift artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-guard-template-drift
          path: reports/template-drift/
      - name: Upload metrics artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-guard-template-metrics
          path: reports/template-metrics/
