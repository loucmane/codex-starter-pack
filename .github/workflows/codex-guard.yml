name: Codex Guard

on:
  pull_request:
  push:
  repository_dispatch:
    types: [aegis-autonomous-delivery]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.client_payload.merge_sha || github.sha }}
      - name: Bind repository-dispatch branch identity
        if: github.event_name == 'repository_dispatch'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          MERGE_SHA: ${{ github.event.client_payload.merge_sha }}
        run: |
          set -euo pipefail
          [[ "$DEFAULT_BRANCH" =~ ^[A-Za-z0-9._/-]+$ ]]
          [[ "$MERGE_SHA" =~ ^[0-9a-f]{40}$ ]]
          git switch -C "$DEFAULT_BRANCH" "$MERGE_SHA"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install project dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 - <<'PY' > /tmp/codex-project-dependencies.txt
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print("\n".join(data["project"]["dependencies"]))
          PY
          python3 -m pip install -r /tmp/codex-project-dependencies.txt
      - name: Sync active plan
        run: python3 scripts/codex-task plan sync
      - name: Run codex guard
        run: python3 scripts/codex-guard validate --include-untracked
      - name: Run template drift check
        run: python3 scripts/codex-guard drift-check --strict
      - name: Generate scanner validation baseline
        run: python3 scripts/template-ssot-scanner/run_all_scanners.py --profile ci
      - name: Verify no automatic reference fixes are pending
        run: |
          mkdir -p reports/reference-fix-gate
          python3 scripts/template-ssot-scanner/apply_reference_fixes.py \
            --dry-run \
            --fail-on-changes \
            --log-file reports/reference-fix-gate/latest.json
      - name: Generate template metrics dashboard
        run: python3 scripts/template-metrics-dashboard
      - name: Generate template monitoring report
        run: python3 scripts/template-monitoring --strict
      - name: Generate Phase 0 scanner validation report
        run: python3 scripts/template-phase0-validation --strict
      - name: Generate template performance report
        run: python3 scripts/template-performance-harness --strict
      - name: Generate cost tracking report
        run: python3 scripts/template-cost-report --strict
      - name: Generate migration health dashboard
        run: python3 scripts/template-migration-health-dashboard --strict
      - name: Upload drift artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codex-guard-template-drift
          path: reports/template-drift/
      - name: Upload metrics artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codex-guard-template-metrics
          path: reports/template-metrics/
      - name: Upload monitoring artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codex-guard-template-monitoring
          path: reports/template-monitoring/
      - name: Upload Phase 0 validation artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codex-guard-phase0-scanner-validation
          path: reports/phase0-scanner-validation/
      - name: Upload reference-fix gate artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codex-guard-reference-fix-gate
          path: reports/reference-fix-gate/
      - name: Upload performance artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codex-guard-template-performance
          path: reports/template-performance/
      - name: Upload cost tracking artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codex-guard-cost-tracking
          path: reports/cost-tracking/
      - name: Upload migration health artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codex-guard-migration-health
          path: reports/migration-health/
