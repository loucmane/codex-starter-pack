name: Meta Workflow Guard

on:
  pull_request:
    paths:
      - 'scripts/codex-guard'
      - 'tests/**'
      - 'docs/ai/work-tracking/**'
      - 'templates/**'
      - 'plans/**'
      - 'sessions/**'
  push:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 - <<'PY' > /tmp/codex-project-dependencies.txt
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print("\n".join(data["project"]["dependencies"]))
          PY
          python3 -m pip install -r /tmp/codex-project-dependencies.txt

      - name: Run timestamp regression suite
        run: python3 -m unittest tests.timestamp_guard.test_timestamp_validation

      - name: Sync active plan
        run: python3 scripts/codex-task plan sync

      - name: Run codex-guard
        run: python3 scripts/codex-guard validate --include-untracked

      - name: Run template drift check
        run: python3 scripts/codex-guard drift-check --strict
      - name: Generate scanner validation baseline
        run: python3 scripts/template-ssot-scanner/run_all_scanners.py --profile ci
      - name: Verify no automatic reference fixes are pending
        run: |
          mkdir -p reports/reference-fix-gate
          python3 scripts/template-ssot-scanner/apply_reference_fixes.py \
            --dry-run \
            --fail-on-changes \
            --log-file reports/reference-fix-gate/latest.json
      - name: Generate template metrics dashboard
        run: python3 scripts/template-metrics-dashboard
      - name: Generate template monitoring report
        run: python3 scripts/template-monitoring --strict
      - name: Generate Phase 0 scanner validation report
        run: python3 scripts/template-phase0-validation --strict
      - name: Generate template performance report
        run: python3 scripts/template-performance-harness --strict
      - name: Generate cost tracking report
        run: python3 scripts/template-cost-report --strict
      - name: Generate migration health dashboard
        run: python3 scripts/template-migration-health-dashboard --strict

      - name: Upload guard artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: meta-workflow-guard-logs
          path: |
            reports/timestamp-guard/
            reports/meta-workflow-guard/
            reports/template-drift/
            reports/template-metrics/
            reports/template-monitoring/
            reports/phase0-scanner-validation/
            reports/reference-fix-gate/
            reports/template-performance/
            reports/cost-tracking/
            reports/migration-health/
