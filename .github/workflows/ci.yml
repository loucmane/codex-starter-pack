name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python-tests:
    name: Python tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Node for Taskmaster CLI
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install project and test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 - <<'PY' > /tmp/codex-ci-dependencies.txt
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          dependencies = list(data["project"]["dependencies"])
          dependencies.extend(data.get("dependency-groups", {}).get("dev", []))
          print("\n".join(dependencies))
          PY
          python3 -m pip install -r /tmp/codex-ci-dependencies.txt
          python3 -m pip install -e .

      - name: Provision pinned Taskmaster CLI
        run: |
          mkdir -p reports/ci
          TASKMASTER_INSTALL_SPEC="$(python3 -m aegis_foundation.taskmaster_toolchain install-spec)"
          npm install -g "$TASKMASTER_INSTALL_SPEC"
          python3 -m aegis_foundation.taskmaster_toolchain capture --output reports/ci/taskmaster-toolchain.json
          task-master --version

      - name: Run Taskmaster health
        run: python3 scripts/codex-task taskmaster health

      - name: Capture reconcile shadow context proof
        run: |
          mkdir -p reports/ci
          python3 - <<'PY' > reports/ci/reconcile-shadow-context-proof.json
          import json
          import os

          from aegis_foundation.reconcile_shadow_apply import build_ci_shadow_context_proof

          payload = {
              "record_type": "reconcile_shadow_context_proof",
              "mode": "shadow",
              "executed": False,
              "mutated_live_repo": False,
              "proof": build_ci_shadow_context_proof(
                  os.environ,
                  task_id="ci-context-proof",
                  proof="git_ancestor",
              ),
          }
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY

      - name: Capture reconcile shadow cascade validation
        run: |
          mkdir -p reports/ci
          python3 - <<'PY' > reports/ci/reconcile-shadow-cascade-validation.json
          import json
          import os
          import tempfile
          from pathlib import Path

          from aegis_foundation.reconcile_shadow_apply import (
              build_ci_shadow_cascade_validation_report,
          )
          from aegis_foundation.taskmaster_toolchain import (
              capture_taskmaster_toolchain_evidence,
          )

          with tempfile.TemporaryDirectory(prefix="aegis-ci-shadow-cascade-") as work_dir:
              payload = build_ci_shadow_cascade_validation_report(
                  os.environ,
                  work_root=Path(work_dir),
                  toolchain_evidence=capture_taskmaster_toolchain_evidence(os.environ),
              )
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY

      - name: Run pytest
        run: |
          mkdir -p reports/ci
          set -o pipefail
          PYTHONDONTWRITEBYTECODE=1 python3 -m pytest | tee "reports/ci/pytest-python-${{ matrix.python-version }}.txt"

      - name: Upload pytest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-pytest-python-${{ matrix.python-version }}
          path: reports/ci/
