name: aegis-witness

on:
  pull_request:

jobs:
  witness:
    name: aegis-witness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install aegis
        run: pip install -q -e .
      - name: Run delivery witness (CI mode)
        run: aegis witness --ci --base "origin/${{ github.base_ref }}"
